name: Deploy to GitHub Pages

# Publishes the static single-file app (index.html) to GitHub Pages.
# Deploys from `main` only (the github-pages environment restricts deployments
# to the default branch). To publish work-in-progress, merge it to `main`.
# `workflow_dispatch` allows a manual deploy from the Actions tab.
on:
  push:
    branches:
      - main
  workflow_dispatch:

# Permissions required for the GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The app is a static index.html at the repo root.
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
