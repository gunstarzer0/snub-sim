# SnubWorks — base compose (local / standalone).
#
# Local preview:
#   docker compose up -d --build      # -> http://localhost:8081
#
# Production on the TEAMFORCE VPS layers the prod override on top, which drops
# the host port and attaches the container to TeamForce's Caddy network:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
services:
  snubworks:
    build: .
    image: snubworks:latest
    container_name: snubworks
    restart: unless-stopped
    expose:
      - "80"
    # Host port is for LOCAL use only; the prod override removes it so nothing
    # competes with TeamForce or exposes the app outside the reverse proxy.
    ports:
      - "8081:80"
