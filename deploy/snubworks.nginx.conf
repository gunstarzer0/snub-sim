# SnubWorks — host-nginx reverse-proxy site.
# Install to:  /etc/nginx/sites-available/snubworks.teamsnubbing.com
# Enable with: ln -s ../sites-available/snubworks.teamsnubbing.com /etc/nginx/sites-enabled/
# Then:        nginx -t && systemctl reload nginx
#
# Assumes the SnubWorks container publishes on 127.0.0.1:8081 (docker-compose.yml).
# TLS block below expects a Let's Encrypt or Cloudflare Origin CA cert on the host.
# If Cloudflare is set to "Flexible", you can omit the 443 block and serve :80 only
# (not recommended — prefer Full/strict with a real origin cert).

server {
    listen 80;
    listen [::]:80;
    server_name snubworks.teamsnubbing.com;

    # ACME http-01 challenge (certbot webroot), everything else -> HTTPS
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name snubworks.teamsnubbing.com;

    # --- pick ONE cert source ---
    # Let's Encrypt (certbot):
    ssl_certificate     /etc/letsencrypt/live/snubworks.teamsnubbing.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/snubworks.teamsnubbing.com/privkey.pem;
    # Cloudflare Origin CA (alternative):
    # ssl_certificate     /etc/ssl/cloudflare/teamsnubbing.com.pem;
    # ssl_certificate_key /etc/ssl/cloudflare/teamsnubbing.com.key;

    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
