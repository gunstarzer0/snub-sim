server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # gzip the text assets (the app is one large HTML file + inline JS)
    gzip              on;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml;

    # index.html changes every deploy — never cache it
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # SPA-style fallback: any unknown path serves the app
    location / {
        try_files $uri $uri/ /index.html;
    }
}
